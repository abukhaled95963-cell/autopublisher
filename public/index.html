<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Auto Publisher Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a2e0a;--bg2:#113311;--bg3:#1a3d1a;--bd:#254025;--ac:#6c63ff;--gn:#00d4a0;--am:#ffb347;--rd:#ff6b6b;--tg:#2AABEE;--tx:#e8e8f0;--t2:#8888a0;--t3:#444458;--r:14px;--rs:8px}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--tx)}
.hdr{background:var(--bg2);border-bottom:1px solid var(--bd);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.ttl{font-size:14px;font-weight:700;background:linear-gradient(135deg,#6c63ff,#00d4a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ver{font-size:9px;color:var(--t2)}
.rbtn{background:linear-gradient(135deg,var(--ac),var(--gn));border:none;color:#fff;padding:6px 12px;border-radius:var(--rs);font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;cursor:pointer}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--bd);display:flex;z-index:100;padding:4px 0 8px}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 2px;cursor:pointer;color:var(--t2);font-size:9px;gap:3px}
.ni.on{color:var(--ac)}
.ni-ic{font-size:18px}
.main{padding:12px 12px 70px}
.pg{display:none}.pg.on{display:block}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:10px 6px;text-align:center}
.sn{font-size:22px;font-weight:700}.sl{font-size:9px;color:var(--t2);margin-top:2px}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:10px}
.ct{font-size:13px;font-weight:700;margin-bottom:10px}
label{display:block;font-size:11px;color:var(--t2);margin-bottom:4px;font-weight:600;margin-top:8px}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rs);padding:9px 10px;color:var(--tx);font-family:'Cairo',sans-serif;font-size:12px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--ac)}
textarea{resize:vertical;min-height:80px;line-height:1.6}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 14px;border-radius:var(--rs);font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border:none;width:100%;margin-top:8px}
.bp{background:var(--ac);color:#fff}.bg2b{background:var(--gn);color:#0a0a0f}
.btg{background:var(--tg);color:#fff}.bfb{background:#1877F2;color:#fff}
.br{background:var(--rd);color:#fff}.bo{background:transparent;border:1px solid var(--bd);color:var(--t2)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.bsm{padding:6px 10px;font-size:11px;margin-top:0;width:auto}
.brow{display:flex;gap:7px;margin-top:8px}
.cc{background:var(--bg3);border:2px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:10px}
.cc.ok{border-color:var(--gn)}
.ch{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ci{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.sb{display:flex;align-items:center;font-size:11px;color:var(--t2);padding:4px 0;margin-top:4px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-left:5px}
.dg{background:var(--gn)}.dr{background:var(--rd)}.da{background:var(--am)}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.ts{background:rgba(0,212,160,.15);color:var(--gn)}.te{background:rgba(255,107,107,.15);color:var(--rd)}
.tp{background:rgba(108,99,255,.15);color:#a89cff}
.al{padding:10px 12px;border-radius:var(--rs);font-size:11px;margin-bottom:10px;line-height:1.7}
.ali{background:rgba(108,99,255,.1);border:1px solid rgba(108,99,255,.3);color:#a89cff}
.alw{background:rgba(255,179,71,.1);border:1px solid rgba(255,179,71,.3);color:var(--am)}
.sp{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.25);border-top-color:currentColor;border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.pi{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rs);padding:10px;margin-bottom:7px;display:flex;align-items:center;gap:8px}
.lg{padding:7px;background:var(--bg3);border-radius:var(--rs);margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.tg{background:var(--bg3);border-right:3px solid var(--tg);padding:10px;margin-bottom:7px;border-radius:0 var(--rs) var(--rs) 0}
.stps{background:rgba(0,0,0,.3);border-radius:var(--rs);padding:10px;margin-bottom:10px;font-size:11px;color:var(--t2);line-height:2}
.stps a{color:var(--ac)}.stps strong{color:var(--tx)}
</style>
</head>
<body>
<div class="hdr">
  <div><div class="ttl">🤖 الناشر الآلي Pro</div><div class="ver" id="ver">v1.0.0</div></div>
  <button class="rbtn" id="rbtn" onclick="runNow()">▶️ تشغيل</button>
</div>
<div class="main">

<div class="pg on" id="pg-dash">
  <div class="stats">
    <div class="stat"><div class="sn" id="ss" style="color:var(--ac)">-</div><div class="sl">مصادر</div></div>
    <div class="stat"><div class="sn" id="sp2" style="color:var(--gn)">-</div><div class="sl">منشورات</div></div>
    <div class="stat"><div class="sn" id="st" style="color:var(--am)">-</div><div class="sl">اليوم</div></div>
    <div class="stat"><div class="sn" id="se" style="color:var(--rd)">-</div><div class="sl">أخطاء</div></div>
  </div>
  <div class="card"><div class="ct">📰 آخر المنشورات</div><div id="dp"></div></div>
  <div class="card"><div class="ct">📋 آخر النشاطات</div><div id="dl"></div></div>
</div>

<div class="pg" id="pg-src">
  <div class="card">
    <div class="ct">➕ إضافة مصدر</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div><label>الاسم</label><input id="sn" placeholder="BBC"></div>
      <div><label>النوع</label><select id="st2"><option value="rss">RSS</option><option value="youtube">YouTube</option><option value="telegram">Telegram</option></select></div>
    </div>
    <label>الرابط</label><input id="su" type="url" placeholder="https://...">
    <button class="btn bp" onclick="addSrc()">➕ إضافة</button>
  </div>
  <div class="card">
    <div class="ct">▶️ تحليل YouTube</div>
    <input id="yu" type="url" placeholder="https://youtube.com/watch?v=...">
    <button class="btn bp" id="ybtn" onclick="analyzeYT()" style="background:#ff0000">▶️ تحليل</button>
    <div id="yr" style="display:none;margin-top:10px"></div>
  </div>
  <div class="card">
    <div class="ct">✈️ قراءة قناة Telegram</div>
    <div style="display:flex;gap:7px">
      <input id="tch" placeholder="channel_name" style="flex:1">
      <button class="btn btg bsm" onclick="readTG()" id="trbtn">📖</button>
    </div>
    <div id="trr" style="display:none;margin-top:10px"></div>
  </div>
  <div class="card"><div class="ct">📡 المصادر <span id="sc" style="font-size:11px;color:var(--t2)">0</span></div><div id="sl"></div></div>
</div>

<div class="pg" id="pg-pub">
  <div class="card">
    <div class="ct">📝 محرر المحتوى</div>
    <label>العنوان</label><input id="pt" placeholder="عنوان المنشور">
    <label>المحتوى</label><textarea id="pc" placeholder="اكتب محتوى المنشور هنا..."></textarea>
    <label>الوسوم</label><input id="pth" placeholder="hashtag1, hashtag2">
    <div class="brow">
      <button class="btn bg2b" onclick="genPost()">🤖 توليد تلقائي</button>
      <button class="btn bp" onclick="savePost()">💾 حفظ</button>
    </div>
  </div>
  <div class="card"><div class="ct">📄 المنشورات المحفوظة</div><div id="ps"></div></div>
</div>

<div class="pg" id="pg-sett">
  <div class="card">
    <div class="ct">🔧 إعدادات الذكي</div>
    <label>مفتاح OpenAI</label><input id="aik" type="password" placeholder="sk-...">
    <label>نموذج AI</label><select id="aim"><option value="gpt-3.5-turbo">GPT-3.5 Turbo</option><option value="gpt-4">GPT-4</option></select>
    <label>طريقة الكتابة</label><select id="wrs"><option value="professional">احترافي</option><option value="casual">عادي</option><option value="news">إخباري</option></select>
  </div>
  <div class="card">
    <div class="ct">⏱️ إعدادات التوقيت</div>
    <label>فترة الفحص (دقائق)</label><input id="ci" type="number" value="30" min="5" max="1440">
    <label>التشغيل التلقائي</label><select id="ar"><option value="1">مفعل</option><option value="0">معطل</option></select>
    <button class="btn bp" onclick="saveSett()">💾 حفظ الإعدادات</button>
  </div>
  <div class="card">
    <div class="ct">📱 منصات النشر</div>
    
    <div class="cc" id="tgc">
      <div class="ch">
        <div class="ci" style="background:var(--tg);color:#fff">✈️</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:12px">تيليغرام</div>
          <div class="sb">
            <span class="dot dr"></span>
            غير متصل
          </div>
        </div>
        <div><span class="tag te">معطل</span></div>
      </div>
      <div><label>Bot Token</label><input id="tgbt" type="password" placeholder="1234567890:ABC..."></div>
      <div><label>Chat ID</label><input id="tgci" placeholder="-1001234567890 أو @channel"></div>
      <button class="btn btg" onclick="testTG()">🧪 اختبار الاتصال</button>
    </div>
    
    <div class="cc" id="fbc">
      <div class="ch">
        <div class="ci" style="background:#1877F2;color:#fff">📘</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:12px">فيسبوك</div>
          <div class="sb">
